[pytest]
testpaths = scraper/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --cov=scraper
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=80
    --strict-markers
    -p no:warnings
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
asyncio_mode = auto
