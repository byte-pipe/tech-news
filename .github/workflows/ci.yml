name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true
      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-poetry-
      - name: Install dependencies
        run: |
          poetry install --no-interaction --no-root
          poetry install --no-interaction
      - name: Install pre-commit
        run: |
          poetry add --group dev pre-commit
          poetry run pre-commit install --install-hooks
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      - name: Run pre-commit checks
        run: |
          # Run pre-commit multiple times to ensure all fixes are applied
          # Some hooks may create changes that need to be fixed by other hooks
          MAX_ATTEMPTS=3
          ATTEMPT=1
          echo "Running pre-commit hooks to fix code formatting..."
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Pre-commit attempt $ATTEMPT of $MAX_ATTEMPTS"
            if poetry run pre-commit run --all-files; then # Run pre-commit on all files (not just staged) to ensure consistency
              echo "Pre-commit passed on attempt $ATTEMPT"
              break
            else
              echo "Pre-commit made changes on attempt $ATTEMPT"
              # Add any files that were modified by pre-commit
              git add --all
              if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
                echo "Warning: Pre-commit still failing after $MAX_ATTEMPTS attempts" # On the last attempt, we'll try to commit anyway
              fi
            fi
            ATTEMPT=$((ATTEMPT + 1))
          done
      - name: Run tests
        run: |
          poetry run pytest scraper/tests/ -v -m "not integration"
      - name: Run sample scraper
        run: |
          poetry run scraper scrape --quiet # Run a test scrape to make sure scrapers work
