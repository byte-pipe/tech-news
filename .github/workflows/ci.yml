name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'
          enable-caching: true
      - name: Install dependencies
        run: uv sync
      - name: Install pre-commit hooks
        run: uv run pre-commit install --install-hooks
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      - name: Run pre-commit checks
        run: |
          MAX_ATTEMPTS=3
          ATTEMPT=1
          echo "Running pre-commit hooks to fix code formatting..."
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Pre-commit attempt $ATTEMPT of $MAX_ATTEMPTS"
            if uv run pre-commit run --all-files; then
              echo "Pre-commit passed on attempt $ATTEMPT"
              break
            else
              echo "Pre-commit made changes on attempt $ATTEMPT"
              git add --all
              if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
                echo "Warning: Pre-commit still failing after $MAX_ATTEMPTS attempts"
              fi
            fi
            ATTEMPT=$((ATTEMPT + 1))
          done
      - name: Run tests
        run: uv run pytest scraper/tests/ -v -m "not integration"
      - name: Run sample scraper
        run: uv run scraper scrape --quiet
